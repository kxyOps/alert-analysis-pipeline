# 镜像版本固定，避免不同时间部署行为漂移（升级时请查阅各镜像 changelog）。
version: '3.8'

services:
  # ── Prometheus（监控数据采集） ──
  prometheus:
    image: prom/prometheus:v2.53.2
    container_name: alert-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - alert-net

  # ── Grafana（可视化 + 告警规则） ──
  grafana:
    image: grafana/grafana:11.4.0
    container_name: alert-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      # 默认与 deploy/.env.example 中 GF_SECURITY_ADMIN_PASSWORD 一致；生产务必修改
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-changeme}
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/alerts:/etc/grafana/provisioning/alerting:ro
    ports:
      - "3000:3000"
    networks:
      - alert-net

  # ── n8n（工作流引擎） ──
  n8n:
    image: n8nio/n8n:1.74.2
    container_name: alert-n8n
    restart: unless-stopped
    environment:
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_HOST=localhost
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_METRICS=false
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168  # 7天
      # ── 告警链路配置 ──
      - HERMES_WEBHOOK_URL=${HERMES_WEBHOOK_URL:-http://localhost:8644/webhooks/alert-receiver}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-your-hmac-secret-here}
      - MONITOR_CONTAINER=${MONITOR_CONTAINER:-your-container}
    volumes:
      - n8n-data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro  # 用于采集容器日志
    ports:
      - "5678:5678"
    networks:
      - alert-net

  # ── 知识库 Web UI ──
  kb-server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.kb
    container_name: alert-kb-server
    restart: unless-stopped
    environment:
      - KB_DATA_DIR=/data
      - KB_PORT=8888
    volumes:
      - kb-data:/data
    ports:
      - "8888:8888"
    networks:
      - alert-net

volumes:
  n8n-data:
  kb-data:

networks:
  alert-net:
    driver: bridge
