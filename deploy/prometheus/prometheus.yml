# Prometheus 全局配置
global:
  scrape_interval: 15s
  evaluation_interval: 15s

# 告警规则（见 alerts/*.yml）
rule_files:
  - "alerts/*.yml"

# 采集目标
scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ── 以下为可选示例：按需取消注释并改成你的服务 /metrics；勿提交真实内网 IP，用 compose 服务名或占位 ──
  #
  # - job_name: "target-services"
  #   metrics_path: "/metrics"
  #   static_configs:
  #     - targets: ["host.docker.internal:8080"]
  #       labels:
  #         group: "demo"
  #
  # Docker Desktop 下采集 cadvisor 等指标示例（需自行部署 exporter；Linux 可能需 extra_hosts）
  # - job_name: "docker-metrics"
  #   static_configs:
  #     - targets: ["host.docker.internal:9323"]
